source: grafana
finding_class: threat_detection
delivery_method: webhook
alerts_path: alerts
required: [id, severity]
field_map:
  id: fingerprint
  title: [labels.alertname, annotations.summary]
  severity: labels.severity
  description: annotations.description
  timestamp: startsAt
  link: generatorURL
  hostname: labels.instance
  code: labels.grafana_code
severity_map:
  exact:
    warning: medium
    info: informational
  default: low
